name: ci
'on': [push, pull_request]
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            tests
            pyproject.toml
            .ruff.toml
            ruff.toml
            ruff.yaml
          sparse-checkout-cone-mode: false
      - if: github.event_name == 'pull_request'
        id: diff
        run: |
          set -euo pipefail
          base="${{ github.base_ref }}"
          git fetch --no-tags --depth=1 origin "$base"
          changed="$(git diff --name-only --diff-filter=ACMR "origin/$base...HEAD" -- tests/ pyproject.toml ruff.toml ruff.yaml .ruff.toml || true)"
          if [ -n "$changed" ]; then
            echo "any=true" >> "$GITHUB_OUTPUT"
            printf "files<<EOF\n%s\nEOF\n" "$changed" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi
      - if: github.event_name == 'pull_request' && steps.diff.outputs.any == 'true'
        uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github
          src: ${{ steps.diff.outputs.files }}
      - if: github.event_name != 'pull_request'
        uses: astral-sh/ruff-action@v3
        with:
          args: check --output-format=github
          src: tests
  test:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            src
            tests
            requirements.txt
          sparse-checkout-cone-mode: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - run: uv pip install --system -r requirements.txt
      - run: pytest -q
