# .pre-commit-config.yaml
# Fast, deterministic, notebook-aware, and CI-friendly.

minimum_pre_commit_version: "3.6.0"

repos:
  # Hygiene / safety checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-added-large-files
        args: ['--maxkb=5000']

  # Ruff (super fast linter/formatter) for .py
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.1
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # Markdown formatter (keeps docs readable)
  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.19
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm==0.3.6

  # Lint notebooks with ruff via nbQA (optional; restrict to .ipynb)
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        additional_dependencies: ["ruff==0.13.2"]
        args: ["--fix"]
        files: "\\.ipynb$"

  # Spelling (source & docs only; avoid notebooks)
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        name: codespell (src+docs; no notebooks)
        args:
          - --ignore-words=.codespellignorewords.txt
          - --skip=./.git,./.venv,./build,./dist,./.mypy_cache,./.pytest_cache,./docs/_build,*.ipynb
        types_or: [python, rst, markdown, yaml, toml, text]
