name: CI — Utopic Dragon #95

on:
  push:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - '**/*.png'
      - '**/*.jpg'
      - '**/*.jpeg'
      - '**/*.svg'
      - '**/*.gif'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash -euo pipefail

env:
  UV_SYSTEM_PYTHON: '1'
  PYTHONDONTWRITEBYTECODE: '1'
  COLUMNS: '120'

jobs:
  lint:
    name: Ruff (format & lint)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check formatting
        uses: astral-sh/ruff-action@v3
        with:
          args: "format --check --diff"
          src: |
            src
            tests

      - name: Lint
        uses: astral-sh/ruff-action@v3
        with:
          args: "check --output-format=github"
          src: |
            src
            tests

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: ${{ !(github.event_name == 'push' && contains(github.event.head_commit.message, '[skip ci]')) }}
    env:
      PYTHONPATH: src
      PYTHONWARNINGS: default
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv (with cache)
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install minimal deps (fast)
        run: |
          uv pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -q
