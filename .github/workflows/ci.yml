name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: "0 12 * * 1"   # weekly (adjust as you like)
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    # expose the secret as an environment variable so it can be used in `if:` expressions
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Determine changed paths
        id: changes
        uses: dorny/paths-filter@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filters: |
            code:
              - '**/*.py'
              - 'pyproject.toml'
              - 'requirements*.txt'
              - '.github/workflows/**'
              - '!**/*.md'

      - name: Install dependencies
        if: ${{ steps.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
        run: |
          python -m pip install --upgrade pip wheel setuptools
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          # Optional: install project if it is a package
          if [ -f pyproject.toml ] || [ -f setup.cfg ] || [ -f setup.py ]; then pip install -e .; fi

      - name: Run tests
        if: ${{ steps.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
        run: |
          python -m pip install pytest coverage pytest-cov || true
          pytest -q --maxfail=1 --disable-warnings --cov=. --cov-report=xml

      - name: Upload coverage to Codecov
        # ✅ FIX: use env.CODECOV_TOKEN in the condition (secrets.* is not allowed in `if:`)
        if: ${{ env.CODECOV_TOKEN != '' && (steps.changes.outputs.code == 'true' || github.event_name == 'schedule') }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: true
          verbose: true
