name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            tests
            pyproject.toml
            .ruff.toml
            ruff.toml
            ruff.yaml
          sparse-checkout-cone-mode: false

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - id: diff
        if: github.event_name == 'pull_request'
        run: |
          set -euo pipefail
          base_sha="${{ github.event.pull_request.base.sha }}"
          git fetch --no-tags --depth=1 origin "$base_sha":"$base_sha"
          changed="$(git diff --name-only --diff-filter=ACMR "$base_sha..$GITHUB_SHA" -- tests/ pyproject.toml ruff.toml ruff.yaml .ruff.toml || true)"
          if [ -n "$changed" ]; then
            printf "files<<EOF\n%s\nEOF\n" "$changed" >> "$GITHUB_OUTPUT"
            echo "any=true" >> "$GITHUB_OUTPUT"
          else
            echo "any=false" >> "$GITHUB_OUTPUT"
          fi

      - if: github.event_name == 'pull_request' && steps.diff.outputs.any == 'true'
        run: |
          set -euo pipefail
          FILES="${{ steps.diff.outputs.files }}"
          uvx ruff check --output-format=github $FILES

      - if: github.event_name != 'pull_request'
        run: uvx ruff check --output-format=github tests

  test:
    runs-on: ubuntu-latest
    env:
      PYTEST_DISABLE_PLUGIN_AUTOLOAD: '1'
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          sparse-checkout: |
            src
            tests
            requirements.txt
            pyproject.toml
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - run: |
          set -euo pipefail
          uv pip install --system -r requirements.txt
          pytest -q
