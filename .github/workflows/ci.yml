name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "05 09 * * 1"  # weekly sanity checks (Mondays 09:05 UTC)

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PIP_NO_PYTHON_VERSION_WARNING: "1"
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"
  FORCE_COLOR: "1"

jobs:
  pre-commit:
    name: Lint, format & hygiene (pre-commit)
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Cache pre-commit
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-
      - name: Run pre-commit (all files)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
      - name: Run push-stage hooks (mypy, etc.)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --hook-stage push

  tests:
    name: Tests (pytest + coverage on 3.11 + torch CPU)
    runs-on: ubuntu-24.04
    needs: pre-commit
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Skip heavy install/pytest when only docs changed
      - name: Determine if code changed
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - "src/**"
              - "tests/**"
              - "pyproject.toml"
              - "requirements*.txt"
              - ".pre-commit-config.yaml"
              - "Makefile"
              - "Dockerfile"
              - ".github/workflows/**"

      - name: Install uv (Python 3.11)
        if: steps.changes.outputs.code == 'true' || github.event_name == 'schedule'
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-suffix: ci
          python-version: "3.11"

      - name: Install dependencies (base + dev + torch CPU)
        if: steps.changes.outputs.code == 'true' || github.event_name == 'schedule'
        run: |
          uv pip install --system -r requirements.txt -r requirements-dev.txt
          # Install the package in editable mode with the lightweight 'torch' extra.
          # Thanks to pyproject [tool.uv.sources], torch wheels are pulled from the CPU index.
          uv pip install --system -e ".[torch]"

      - name: Show environment snapshot
        if: steps.changes.outputs.code == 'true' || github.event_name == 'schedule'
        run: |
          python - <<'PY'
          import platform, sys
          print("Python:", sys.version.replace("\n"," "))
          try:
              import torch, numpy
              print("torch:", torch.__version__, "|", "numpy:", numpy.__version__)
          except Exception as e:
              print("env-warn:", e)
          PY

      - name: Run tests
        if: steps.changes.outputs.code == 'true' || github.event_name == 'schedule'
        run: |
          pytest -q --maxfail=1 --disable-warnings --cov=physical_ai_stl --cov-report=xml

      - name: Upload coverage to Codecov (optional)
        if: secrets.CODECOV_TOKEN != '' && (steps.changes.outputs.code == 'true' || github.event_name == 'schedule')
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  tests-matrix:
    # Broader compatibility sweep runs only on the weekly schedule or manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    name: Weekly tests (matrix)
    runs-on: ubuntu-24.04
    needs: pre-commit
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv (Python ${{ matrix.python-version }})
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-suffix: weekly
          python-version: ${{ matrix.python-version }}

      - name: Install deps + package (torch CPU)
        run: |
          uv pip install --system -r requirements.txt -r requirements-dev.txt
          uv pip install --system -e ".[torch]"

      - name: Pytest
        run: pytest -q --maxfail=1 --disable-warnings

  build:
    name: Build package (wheel + sdist)
    runs-on: ubuntu-24.04
    needs: pre-commit
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Build
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check --strict dist/*

      - name: Smoke test wheel import
        run: |
          python -m venv /tmp/venv
          /tmp/venv/bin/python -m pip install --upgrade pip
          /tmp/venv/bin/python -m pip install dist/*.whl
          /tmp/venv/bin/python - <<'PY'
          import importlib, sys
          m = importlib.import_module("physical_ai_stl")
          print("import ok", getattr(m, "__version__", "0.0.0"))
          PY

  links:
    name: Link check (README/docs)
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect doc changes
        id: docs
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docs:
              - "README.md"
              - "docs/**"
              - "**/*.md"
              - ".github/**/*.md"

      - name: Restore lychee cache
        if: steps.docs.outputs.docs == 'true' || github.event_name == 'schedule'
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            lychee-${{ runner.os }}-

      - name: Check links with lychee
        if: steps.docs.outputs.docs == 'true' || github.event_name == 'schedule'
        uses: lycheeverse/lychee-action@v2.6.1
        with:
          args: --base . --cache --max-cache-age 1d --no-progress --verbose "./**/*.md"
          fail: false
          jobSummary: true

  security:
    name: Dependency audit
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          # Audit requirement pins; this does not modify the environment
          inputs: |
            requirements.txt
            requirements-dev.txt
            requirements-extra.txt
