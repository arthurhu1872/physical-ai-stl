name: ci
on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          # Lint tests (as you had); consider `ruff check .` to lint src too
          ruff check tests

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest -q
