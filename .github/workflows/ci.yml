---
name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-hygiene:
    name: Lint & hygiene
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml

      - name: Install deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pre-commit (format + lint + hygiene)
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure

  tests:
    name: Tests (unit / minimal deps) – Python ${{ matrix.py }}
    runs-on: ubuntu-24.04
    needs: lint-hygiene
    strategy:
      fail-fast: false
      matrix:
        py: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.py }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            pyproject.toml
      - name: Install deps
        run: |
          python -m pip install --upgrade pip wheel setuptools
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run unit tests
        run: pytest -q

  tests-optional-extras:
    name: Tests (optional extras)
    if: ${{ github.event_name != 'pull_request' }}
    runs-on: ubuntu-24.04
    needs: tests
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install with extras (if present)
        run: |
          python -m pip install --upgrade pip wheel setuptools
          if [ -f requirements-extra.txt ]; then
            pip install -r requirements-extra.txt
          fi
      - name: Smoke tests for extras
        run: |
          python - <<'PY'
          print("extras smoke OK")
          PY
