[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "physical-ai-stl"
description = "Signal Temporal Logic (STL) & spatio-temporal logic (STREL) monitoring utilities for physics-based ML models (neural ODE/PDE, physical AI)."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
# Keep base install lean for CI and users who only need the core utilities.
dependencies = [
  "numpy>=1.26,<3.0",
]
# Single source of truth for version
dynamic = ["version"]

authors = [{ name = "physical-ai-stl contributors" }]

classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Scientific/Engineering",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.optional-dependencies]
# Optional PyTorch (kept separate so base installs stay light)
torch = [
  "torch>=2.3,<3.0",
]

# STL/STREL monitoring stacks
monitoring = [
  "rtamt>=0.3,<0.4",              # STL monitors (PyPI: rtamt)
  "moonlight>=0.3,<0.4",          # STREL via MoonLight (PyPI: moonlight)
  "spatial-spec>=0.1.1,<0.2; platform_system != 'Windows'",
  # SpaTiaL implementation from source (no Windows due to MONA/ltlf2dfa)
  "spatial @ git+https://github.com/KTH-RPL-Planiacs/SpaTiaL.git#subdirectory=spatial-lib; platform_system != 'Windows'",
]

# Physics-based ML frameworks
frameworks = [
  "neuromancer>=1.5.4,<2.0",
  "torchphysics>=1.0,<2.0",
  # PhysicsNeMo: published under NVIDIA namespace; Linux is best supported
  "nvidia-physicsnemo>=1.2,<2.0; platform_system == 'Linux'",
]

# Plotting & utilities used by examples/experiments
viz = [
  "matplotlib>=3.10,<4.0",
  "tqdm>=4.67",
  "pyyaml>=6.0.2",
  # SciPy split to keep Py3.10 working while allowing newer on >=3.11
  "scipy>=1.16; python_version >= '3.11'",
  "scipy>=1.15,<1.16; python_version < '3.11'",
]

# Development tools kept out of runtime to stay lean
dev = [
  "pytest>=8.4,<9.0",
  "pytest-cov>=5.0,<6.0",
  "ruff>=0.12,<0.13",
  "mypy>=1.11,<2.0",
  "types-PyYAML>=6.0.12",
]

# Convenience metapackage (avoid self-references to keep resolution simple)
all = [
  # torch
  "torch>=2.3,<3.0",
  # monitoring
  "rtamt>=0.3,<0.4",
  "moonlight>=0.3,<0.4",
  "spatial-spec>=0.1.1,<0.2; platform_system != 'Windows'",
  "spatial @ git+https://github.com/KTH-RPL-Planiacs/SpaTiaL.git#subdirectory=spatial-lib; platform_system != 'Windows'",
  # frameworks
  "neuromancer>=1.5.4,<2.0",
  "torchphysics>=1.0,<2.0",
  "nvidia-physicsnemo>=1.2,<2.0; platform_system == 'Linux'",
  # viz & utils
  "matplotlib>=3.10,<4.0",
  "tqdm>=4.67",
  "pyyaml>=6.0.2",
  "scipy>=1.16; python_version >= '3.11'",
  "scipy>=1.15,<1.16; python_version < '3.11'",
]

[tool.hatch.version]
path = "src/physical_ai_stl/__init__.py"

[tool.hatch.build.targets.wheel]
# Package only the module; keep wheels tiny.
packages = ["src/physical_ai_stl"]
# Ship typing marker
force-include = { "src/physical_ai_stl/py.typed" = "physical_ai_stl/py.typed" }

[tool.hatch.build.targets.sdist]
include = [
  "src/**",
  "tests/**",
  "README.md",
  "LICENSE",
  "pyproject.toml",
  "configs/**",
  "docs/**",
  "scripts/**",
  ".github/workflows/ci.yml",
]
exclude = ["**/__pycache__"]

# -----------------------------
# Testing
# -----------------------------
[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-q"
testpaths = ["tests"]
filterwarnings = ["ignore::DeprecationWarning"]

# -----------------------------
# Ruff (fast linter/formatter)
# -----------------------------
[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# Keep the rule set modest for speed and signal, matching CI needs.
select = ["E", "F", "I", "UP"]
# The tests are intentionally rough-and-ready; relax a few rules there to keep CI green.
per-file-ignores = { "tests/**.py" = ["I001", "E501", "UP035", "UP038"] }

[tool.ruff.format]
quote-style = "preserve"

# -----------------------------
# MyPy (practical strictness)
# -----------------------------
[tool.mypy]
python_version = "3.10"
warn_unused_ignores = true
warn_redundant_casts = true
warn_unused_configs = true
disallow_untyped_defs = true
no_implicit_optional = true
check_untyped_defs = true
ignore_missing_imports = true

# -----------------------------
# uv: make setup-uv deterministic & fast
# -----------------------------
[tool.uv]
# So setup-uv doesn't “fall back to latest”
required-version = ">=0.8.15"

[tool.uv.pip]
# Prefer fewer forks during resolution for CI speed.
fork-strategy = "fewest"

[tool.uv.sources]
# If torch is requested (via extras), use CPU wheels to avoid CUDA downloads in CI.
torch = { index = "pytorch-cpu" }
# NVIDIA PhysicsNeMo lives on NVIDIA’s package index.
"nvidia-physicsnemo" = { index = "nvidia" }

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "nvidia"
url = "https://pypi.nvidia.com/simple"
explicit = true
