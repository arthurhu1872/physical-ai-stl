[build-system]
requires = ["setuptools>=65", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "physical-ai-stl"
version = "0.1.0"
description = "Signal Temporal Logic (STL) and spatio-temporal logic (STREL) monitoring for physics-based ML models"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.23,<2.0"
]

[project.optional-dependencies]
# Full stack for experiments and monitoring (heavy deps)
full = [
    "torch",
    "matplotlib",
    "tqdm",
    "pyyaml",
    "rtamt",
    "moonlight",
    "neuromancer",
    "torchphysics",
    "physicsnemo",
    "spatial-spec",
    "spatial",
    "pytorch-lightning"
]
# Developer extras
dev = [
    "ruff>=0.5.6",
    "pytest>=7.0"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
physical_ai_stl = ["py.typed"]
