[project]
name = "physical-ai-stl"
version = "0.1.0"
description = "Signal Temporal Logic (STL) and spatio-temporal logic (STREL) monitoring for physics-based ML models"
license = "MIT"
requires-python = ">=3.9"
dependencies = [
    "numpy>=1.23,<2.0",
    "pytest>=7.0"
]

[project.optional-dependencies]
full = [
    "torch",
    "matplotlib",
    "tqdm",
    "pyyaml",
    "rtamt",
    "moonlight",
    "neuromancer",
    "torchphysics",
    "physicsnemo",
    "spatial-spec"
]
dev = [
    "ruff>=0.5.6"
]
