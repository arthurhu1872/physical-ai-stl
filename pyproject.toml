[build-system]
requires = ["hatchling>=1.25"]
build-backend = "hatchling.build"

[project]
name = "physical-ai-stl"
description = "Signal Temporal Logic (STL) and spatio-temporal logic (STREL) monitoring utilities for physics-based ML models"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.10"
# Keep the runtime deps lean for speed and resource efficiency in CI and installs.
dependencies = [
  "numpy>=1.26,<3.0",
]
# Version is defined in the package to avoid double specification.
dynamic = ["version"]

authors = [
  { name = "physical-ai-stl contributors" }
]

classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.optional-dependencies]
# Minimal developer tooling (fast to install)
dev = [
  "pytest>=8.3",
  "pytest-cov>=5.0",
  "ruff>=0.5.6",
  "mypy>=1.10",
  "types-PyYAML>=6.0.12.20240808",
]

# Visualization and helpers (kept separate from core for lightweight installs)
viz = [
  "matplotlib>=3.8",
  "tqdm>=4.66",
  "pyyaml>=6.0",
]

# STL / STREL monitoring stacks (each is optional and can be heavy)
monitoring = [
  # MoonLight provides Python bindings to a Java engine (spatio-temporal STREL)
  "moonlight>=0.3,<0.4",
  # RTAMT STL monitors
  "rtamt>=0.3,<0.4",
  # SpaTiaL specifications; relies on system MONA (not Windows-friendly)
  "spatial-spec>=0.1.1,<0.2; platform_system != 'Windows'",
]

# Physics-based ML frameworks (optional; some require PyTorch)
frameworks = [
  "neuromancer>=1.5.4,<2.0",
  "torchphysics>=1.0,<2.0",
  # PhysicsNeMo wheels are published under the NVIDIA namespace
  "nvidia-physicsnemo>=1.1,<2.0; platform_system != 'Windows'",
]

# PyTorch is optional—do NOT install by default (heavy). See [tool.uv.sources] below for CPU wheels.
torch = [
  "torch>=2.3,<3.0",
]

# Convenience bundle that stays CPU- and CI‑friendly (excludes PyTorch to avoid massive CUDA deps)
all = [
  "physical-ai-stl[monitoring,frameworks,viz]",
]

# A tiny set intended for CI or quick local runs; avoids heavy frameworks entirely
ci = [
  "pytest>=8.3",
  "ruff>=0.5.6",
  "numpy>=1.26,<3.0",
]

[tool.hatch.version]
# Single source of truth for the version
path = "src/physical_ai_stl/__init__.py"

[tool.hatch.build.targets.wheel]
packages = ["src/physical_ai_stl"]
# Include typing marker
force-include = { "src/physical_ai_stl/py.typed" = "physical_ai_stl/py.typed" }

[tool.hatch.build.targets.sdist]
# Ship source, docs, and tests; omit large or generated artifacts if they appear in repo
include = ["src", "tests", "README.md", "LICENSE", "pyproject.toml"]
exclude = [".github", "**/__pycache__"]

# -----------------------------
# Quality / tooling (fast config)
# -----------------------------
[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
filterwarnings = [
  "ignore::DeprecationWarning",
]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP"] # pyflakes/pycodestyle/imports/pyupgrade
ignore = []

[tool.mypy]
python_version = "3.10"
strict = false
warn_unused_ignores = true
ignore_missing_imports = true
check_untyped_defs = true
no_implicit_optional = true

# -----------------------------
# uv: make CI faster + predictable
# -----------------------------
[tool.uv]
# Ensure setup-uv picks a known-good version without hitting the GitHub API every run.
required-version = ">=0.8.15"

[tool.uv.pip]
# Prefer fewer forks during resolution for speed on CI.
fork-strategy = "fewest"

# Pin heavy packages to fast, CPU-friendly indexes when they are installed.
[tool.uv.sources]
# Install torch from the CPU wheel index when requested via extras (avoids CUDA downloads on CI)
torch = { index = "pytorch-cpu" }
# PhysicsNeMo wheels from NVIDIA’s index (import name is `physicsnemo`, dist is `nvidia-physicsnemo`)
"nvidia-physicsnemo" = { index = "nvidia" }

# Define the additional indexes referenced above.
[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[[tool.uv.index]]
name = "nvidia"
url = "https://pypi.nvidia.com/simple"
explicit = true
