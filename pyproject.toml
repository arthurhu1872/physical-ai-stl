[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "physical-ai-stl"
version = "0.1.0"
description = "STL/STREL monitoring + minimal PDE demos (CI-light, research-heavy locally)"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
  "numpy>=1.23,<2.0"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
include = ["physical_ai_stl*", "stlai*"]

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
# Keep it minimal in CI; we only check tests anyway.
select = ["E", "F"]
ignore = ["E203", "E501"]
