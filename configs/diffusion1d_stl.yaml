# 1D diffusion PINN with STL safety constraint on the field amplitude
# This config enforces the STL formula:  G_t [ max_x u(x,t) <= u_max ]
# (global-in-time bound on the spatial maximum), using smooth robustness semantics.
experiment: diffusion1d
tag: stl
seed: 0

# Neural field model
model:
  hidden: [64, 64, 64]     # three-layer MLP; strong accuracy/latency tradeoff
  activation: tanh         # stable for PINNs solving parabolic PDEs
  # out_activation: null   # optional; left unset

# Spatial-temporal grid used for exported snapshots (not training batch size)
grid:
  n_x: 128                 # spatial resolution for export/eval grid
  n_t: 64                  # time resolution for export/eval grid
  x_min: 0.0
  x_max: 1.0
  t_min: 0.0
  t_max: 1.0

# Optimizer & sampling
optim:
  lr: 0.002                # Adam step size
  epochs: 200              # training epochs
  batch: 4096              # interior collocation points per step
  weight_decay: 0.0
  n_boundary: 256          # boundary samples per epoch (Dirichlet: u(0,t)=u(1,t)=0)
  n_initial: 512           # initial-condition samples per epoch (default: sine IC)
  sample_method: sobol     # low-discrepancy sampling for better coverage

# Physics (heat/diffusion equation u_t = alpha * u_xx)
physics:
  alpha: 0.1               # diffusion coefficient

# STL monitoring/penalty (enabled)
stl:
  use: true
  weight: 10.0             # strength of STL penalty (balances PDE/BC/IC vs. STL)
  u_max: 1.0               # safety bound on amplitude (consistent with sine IC amplitude)
  temp: 0.05               # temperature for smooth mins/maxes (lower -> closer to hard min/max)
  spatial: amax            # use spatial maximum to enforce the worst-case bound
  every: 1                 # evaluate STL penalty every epoch (k=1) for strict enforcement
  n_x: 64                  # coarse grid for STL monitor (decoupled from training batch)
  n_t: 64

# System/runtime
device: null               # null => auto (cuda -> mps -> cpu)
dtype: float32             # mixed precision off by default for stable higher-order grads
amp: false
compile: true              # torch.compile when available (falls back safely if unavailable)
print_every: 25

# I/O
io:
  results_dir: results     # artifacts: csv log, checkpoint, final field tensor
  save_ckpt: true
