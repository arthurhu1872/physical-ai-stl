# 2D Heat Equation PINN baseline (reproducible, STL-ready)
# Domain: [x,y] \in [0,1]^2, t \in [0,1]
# IC: Gaussian bump at t=0 centered in the domain (see physics/heat2d.py)
# BC: Homogeneous Dirichlet on all sides (u=0) (see physics/heat2d.py)
# This baseline is conservative for stability (fp32, AMP off), but fast and lightweight.
experiment: heat2d
tag: baseline
seed: 0

# Neural field model
model:
  hidden: [64, 64, 64]   # three-layer MLP; solid accuracy/latency trade-off
  activation: tanh       # robust default for parabolic PDEs

# Spatial-temporal grid used for collocation/evaluation
grid:
  n_x: 64                # x-resolution (collocation/eval grid)
  n_y: 64                # y-resolution (collocation/eval grid)
  n_t: 16                # time resolution (collocation/eval grid)
  x_min: 0.0
  x_max: 1.0
  y_min: 0.0
  y_max: 1.0
  t_min: 0.0
  t_max: 1.0

# Optimizer & training schedule
optim:
  lr: 0.002              # Adam LR
  epochs: 200            # short, reproducible baseline
  batch: 4096            # interior collocation points / step (subsampled from grid)
  weight_decay: 0.0
  amsgrad: true
  scheduler: cosine      # cosine annealing to zero over 'epochs'
  step_size: 100         # (unused for cosine)
  gamma: 0.5             # (unused for cosine)
  grad_clip: 1.0         # global-norm clip for stability
  compile: true          # torch.compile if available (falls back safely)
  amp: false             # disable mixed precision (second-order grads are sensitive)
  device: auto           # auto => cuda -> mps -> cpu

# Physics (heat equation u_t = alpha (u_xx + u_yy))
physics:
  alpha: 0.1             # diffusivity
  bcic_weight: 1.0       # weight on BC/IC penalty term

# Residual-based adaptive refinement (RAR): off by default; enable for harder problems
rar:
  pool: 0                # number of pool points to probe residuals (0 disables RAR)
  hard_frac: 0.5         # fraction of batch replaced by hardest residuals
  every: 10              # apply RAR every N epochs

# Optional STL monitor/penalty (smooth robustness semantics)
# STL notion here is a global-in-time amplitude bound over space:
#   G_t [ u_min <= u(x,y,t) <= u_max ] on a coarse monitor grid.
stl:
  use: false             # baseline keeps logic off; flip to true to enforce bounds
  weight: 10.0           # penalty weight when 'use: true'
  u_min: 0.0             # consistent with Gaussian IC and zero-Dirichlet BCs
  u_max: 1.0
  margin: 0.0            # slack margin (>=0)
  beta: 10.0             # softplus scale in penalty
  temp: 0.1              # temperature for soft min/max aggregations
  n_x: 32                # coarse monitor grid (decoupled from train batch/grid)
  n_y: 32
  n_t: 16
  every: 10              # compute monitor every N epochs to amortize cost
  # (optional subregion for monitoring; defaults inherit from grid if null)
  x_min: null
  x_max: null
  y_min: null
  y_max: null
  t_min: null
  t_max: null

# Output / logging
io:
  results_dir: results
  save_ckpt: true
  save_frames: true
  frames_idx: [0, 8, 15] # time indices to export (clamped to [0, n_t-1])
  save_figs: true
  print_every: 25
