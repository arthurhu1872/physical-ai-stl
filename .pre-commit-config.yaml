---
# Pre-commit: fast, reliable, and low-noise checks for this repo.
# Order matters: formatters/fixers run before pure linters.
# Primary tools: Ruff (lint + format), Codespell, and hygiene hooks.

ci:
  autofix_prs: false
  autoupdate_schedule: monthly

minimum_pre_commit_version: "3.7.0"

default_language_version:
  python: python3

# Skip large/generated artifacts and caches to keep hooks snappy.
exclude: >
  (?x)^(
    \.git/|
    \.venv/|
    \.mypy_cache/|
    \.pytest_cache/|
    \.ruff_cache/|
    \.hypothesis/|
    dist/|
    build/|
    docs/_build/|
    results/|
    runs/|
    figs/|
    data/|
    .*\.svg$
  )

repos:
  # --- Core hygiene -----------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: check-yaml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
      - id: check-json
      - id: check-ast
      - id: check-docstring-first
      - id: check-toml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: detect-private-key
      - id: debug-statements
      - id: name-tests-test
        args: [--pytest-test-first]
      - id: check-added-large-files
        args: [--maxkb=1024]
      # Optionally protect main branches from direct commits.
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # --- Ruff: formatter + linter (ultra-fast, replaces black+isort+flake8) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.13.2
    hooks:
      - id: ruff-check
        name: ruff (lint+fix)
        args: [--fix]
        types_or: [python, pyi, jupyter]
      # Code formatter (Black-compatible).
      - id: ruff-format
        name: ruff (format)
        types_or: [python, pyi, jupyter]

  # --- Markdown: format and keep tables/links tidy ---------------------------
  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        name: mdformat (GFM + ruff for code fences)

  # --- Notebook basic hygiene ------------------------------------------------
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        name: nbqa-ruff (lint)
        types_or: [jupyter]
      - id: nbqa-codespell
        name: nbqa-codespell
        args: ["codespell", "--ignore-words=.codespellignorewords.txt"]
        files: \.ipynb$

  # --- Project metadata formatting -------------------------------------------
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: v2.6.0
    hooks:
      - id: pyproject-fmt
        stages: [manual]  # disabled in CI due to pep508 parser bug on direct URLs

  # --- Optional: static typing on push (kept light for speed) ----------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        name: mypy (push-only)
        stages: [push]
        files: ^(src|tests)/.*\.py$
        args: ["--ignore-missing-imports"]
        additional_dependencies:
          - types-PyYAML
          - numpy
