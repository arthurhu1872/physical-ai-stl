---
# Pre-commit configuration for formatting, lint, hygiene, and notebooks.
# - codespell runs on regular text/code files
# - nbQA runs ruff/black on notebooks and a custom nbqa-codespell
# Pin hook revisions for reproducibility.

repos:
  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
        args: [--allow-multiple-documents]
      - id: check-added-large-files

  # YAML lint (uses .yamllint.yaml in repo root)
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint

  # Python lint/format (code)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]

  # Markdown format
  - repo: https://github.com/hukkin/mdformat
    rev: 0.7.17
    hooks:
      - id: mdformat
        additional_dependencies:
          - mdformat-gfm

  # Spelling (regular files)
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.1
    hooks:
      - id: codespell
        # Tune to your repo; keeps noisy dirs/files out
        args:
          - --skip=.git,*.lock,*.svg,*.png,*.jpg,*.pdf,third_party,build,dist
          - --ignore-words-list=crate,ot,pullrequest
        additional_dependencies:
          - tomli

  # Notebooks via nbQA
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        additional_dependencies: [ruff==0.13.2]
      - id: nbqa-black
        additional_dependencies: [black==24.10.0]
      # Custom nbqa hook to run codespell on notebooks
      - id: nbqa
        name: nbqa-codespell
        alias: nbqa-codespell
        entry: nbqa codespell
        additional_dependencies: [codespell==2.4.1]
        args:
          - --ignore-words-list=crate,ot,pullrequest
